<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Concert Calendar Website</title>
  <style>
    :root{--ink:#111827;--muted:#64748b;--line:#e2e8f0;--bg:#f8fafc;--radius:10px}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}
    header{padding:28px clamp(16px,4vw,44px);background:#111827;color:#fff}h1{margin:0;font-size:clamp(30px,5vw,56px);line-height:1}.sub{margin:12px 0 0;color:#cbd5e1;max-width:780px;line-height:1.65}
    main{padding:22px clamp(16px,4vw,44px) 50px}.toolbar{position:sticky;top:0;z-index:2;margin:-22px calc(clamp(16px,4vw,44px)*-1) 20px;padding:14px clamp(16px,4vw,44px);background:rgba(248,250,252,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
    input{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:var(--radius);font:inherit;background:#fff;box-shadow:0 1px 0 rgba(15,23,42,.02)}.filters{display:grid;gap:0;margin:18px 0 16px;border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:0 10px 28px rgba(15,23,42,.06);overflow:hidden}.filter-group{display:grid;grid-template-columns:112px minmax(0,1fr);gap:12px;align-items:start;padding:13px 14px}.filter-group+.filter-group{border-top:1px solid #eef2f7}.filter-label{padding-top:8px;color:#64748b;font-size:12px;font-weight:850;letter-spacing:.02em;text-transform:uppercase}.filter-row{display:flex;gap:8px;overflow:auto;padding-bottom:2px;scrollbar-width:thin}.chip{display:inline-flex;align-items:center;gap:8px;min-height:36px;border:1px solid transparent;background:#f8fafc;color:#334155;border-radius:999px;padding:5px 6px 5px 12px;font-weight:760;white-space:nowrap;cursor:pointer;transition:background .15s,border-color .15s,transform .15s}.chip:hover{border-color:#cbd5e1;background:#fff}.chip-count{display:inline-grid;place-items:center;min-width:24px;height:24px;padding:0 7px;border-radius:999px;background:#e2e8f0;color:#334155;font-size:12px;line-height:1;font-weight:850}.chip.active{background:#111827;color:#fff;border-color:#111827}.chip.active .chip-count{background:#fff;color:#111827}.summary{margin:12px 0;color:#475569}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}.month-section{grid-column:1/-1;width:100%;margin-top:30px}.month-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 14px;padding:0 0 10px;border-bottom:1px solid var(--line);font-size:24px;line-height:1.2}.month-title span{display:inline-grid;place-items:center;min-width:42px;height:28px;padding:0 10px;border-radius:999px;background:#e2e8f0;color:#475569;font-size:13px;font-weight:850}.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:0 8px 26px rgba(15,23,42,.06)}@media(max-width:700px){.filter-group{grid-template-columns:1fr;gap:8px}.filter-label{padding-top:0}.toolbar{position:static}}
    .cover{display:block;aspect-ratio:4/3;background:#e2e8f0;overflow:hidden}.cover img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}.cover:hover img{transform:scale(1.03)}.body{padding:14px}.meta{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px}.pill{font-size:12px;font-weight:800;border-radius:999px;background:#ecfeff;color:#0f766e;padding:5px 8px}.source{background:#f1f5f9;color:#475569}h2{font-size:17px;line-height:1.3;margin:0 0 8px}.title{color:inherit;text-decoration:none}.title:hover{text-decoration:underline}.venue,.date,.price{font-size:13px;color:#64748b;line-height:1.45;margin:6px 0}.price{font-weight:800;color:#334155}.open{display:inline-flex;margin-top:10px;background:#111827;color:#fff;text-decoration:none;border-radius:8px;padding:9px 11px;font-size:13px;font-weight:800}.empty{display:none;padding:28px;border:1px dashed var(--line);border-radius:var(--radius);background:#fff;color:#64748b}.empty.show{display:block}
  </style>
</head>
<body>
<header><h1>Concert Calendar Website</h1><p class="sub">เว็บรวมคอนเสิร์ตในไทย แยกตามเดือน ประเภท และเว็บขายบัตร พร้อมลิงก์ไปหน้ารายละเอียดจริงของแต่ละงาน</p></header>
<main>
  <div class="toolbar"><input id="q" placeholder="ค้นหาชื่อคอนเสิร์ต สถานที่ หรือเว็บขายบัตร"></div>
  <div class="filters" aria-label="ฟิลเตอร์คอนเสิร์ต">
    <div class="filter-group"><div class="filter-label">ประเภท</div><div id="cats" class="filter-row"></div></div>
    <div class="filter-group"><div class="filter-label">เว็บขายบัตร</div><div id="sources" class="filter-row"></div></div>
    <div class="filter-group"><div class="filter-label">เดือน</div><div id="months" class="filter-row"></div></div>
  </div>
  <p id="summary" class="summary">กำลังโหลดข้อมูล...</p><section id="grid" class="grid"></section><div id="empty" class="empty">ไม่พบงานตามฟิลเตอร์ที่เลือก</div>
</main>
<script>
const parts=Array.from({length:12},(_,i)=>i+1).map(n=>`data/real-events-${String(n).padStart(2,'0')}.jsonpart`);
const thMonths=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const state={cat:'all',source:'all',month:'all',q:''};let all=[];
const imageOverrides={
  'ttm-performance-bangkok-s-28th-international-festival-of-dance-music':'https://www.thaiticketmajor.com/bangkokfestivals/assets/img/hb.jpg?v=2026',
  'ttm-performance-new-york-city-opera-opera-goes-to-hollywood':'https://www.thaiticketmajor.com/img_poster/prefix_1/0718/6718/new-york-city-opera-opera-goes-to-hollywood-69fb059e24288-l.png',
  'ttm-performance-romeo-juliet-by-bolshoi-theatre-of-belarus':'https://www.thaiticketmajor.com/img_poster/prefix_1/0719/6719/romeo-and-juliet-bolshoi-theatre-of-belarus-69fb06fc4707b-l.png',
  'ttm-performance-cinderella-by-bolshoi-theatre-of-belarus':'https://www.thaiticketmajor.com/img_poster/prefix_1/0720/6720/cinderella-bolshoi-theatre-of-belarus-69fb07fc93a59-l.png',
  'ttm-performance-rite-by-deborah-colker-dance-company':'https://www.thaiticketmajor.com/img_poster/prefix_1/0721/6721/rite-deborah-colker-dance-company-69fb0902dbfd1-l.png',
  'ttm-performance-sadeck-berrabah-murmuration-level-2':'https://www.thaiticketmajor.com/img_poster/prefix_1/0722/6722/sadeck-berrabah-murmuration-level-2-69fb09f4e9786-l.png',
  'ttm-performance-alice-in-wonderland-by-wings-show-production':'https://www.thaiticketmajor.com/img_poster/prefix_1/0723/6723/alice-in-wonderland-by-wings-show-production-6a3a05cfed168-l.png',
  'ttm-performance-the-great-gatsby-by-enrique-gasa-valga-dance-company':'https://www.thaiticketmajor.com/img_poster/prefix_1/0724/6724/the-great-gatsby-enrique-gasa-valga-dance-company-69fb0c5c220b0-l.png',
  'ttm-performance-coco-chanel-by-national-theatre-brno':'https://www.thaiticketmajor.com/img_poster/prefix_1/0725/6725/coco-chanel-national-theatre-brno-69fb0d6790174-l.png',
  'ttm-performance-la-traviata-by-helikon-opera':'https://www.thaiticketmajor.com/img_poster/prefix_1/0726/6726/la-traviata-helikon-opera-69fb0e9294bfd-l.png',
  'ttm-performance-madama-butterfly-by-helikon-opera':'https://www.thaiticketmajor.com/img_poster/prefix_1/0727/6727/madama-butterfly-helikon-opera-69fb0fbaa9b5e-l.png',
  'ttm-performance-the-pygmalion-effect-by-eifman-ballet':'https://www.thaiticketmajor.com/img_poster/prefix_1/0728/6728/the-pygmalion-effect-eifman-ballet-69fb10a64164a-l.png',
  'ttm-performance-russian-hamlet-by-eifman-ballet':'https://www.thaiticketmajor.com/img_poster/prefix_1/0729/6729/russian-hamlet-eifman-ballet-69fb114edb476-l.png',
  'ttm-performance-pantomime-in-bangkok-18':'https://www.thaiticketmajor.com/img_poster/prefix_1/0774/6774/pantomime-in-bangkok-18-6a2a36692e15a-l.png',
  'ttm-performance-2026-byeonwooseok-asia-fanmeeting-tour-the-secret-library-in-bangkok':'https://www.thaiticketmajor.com/img_poster/prefix_1/0778/6778/2026-byeonwooseok-asia-fanmeeting-tour-the-secret-library-in-bangkok-6a4f5509455a2-l.png'
};
const categoryOverrides={
  'ttm-feel-fan-fun-party-concert':{category:'thai',categoryLabel:'ไทย'},
  'ttm-nuvoriginal':{category:'thai',categoryLabel:'ไทย'},
  'ttm-junior-mark-sunnymoon-concert':{category:'thai',categoryLabel:'ไทย'},
  'ttm-no1-supernova':{category:'thai',categoryLabel:'ไทย'},
  'ttm-b-day-sbz-uncut-live-reel-01':{category:'thai',categoryLabel:'ไทย'},
  'ttm-remaster-concert':{category:'thai',categoryLabel:'ไทย'}
};
const extraEvents=[{
  id:'ttm-performance-drama-queens-the-musical',
  title:'เมืองมารยา เดอะมิวสิคัล',
  category:'stage',
  categoryLabel:'ละครเวที',
  source:'ThaiTicketMajor',
  venue:'เมืองไทยรัชดาลัย เธียเตอร์',
  saleDate:'2026-07-06T10:00:00+07:00',
  saleText:'ซื้อบัตร',
  eventDate:'2026-08-17T19:30:00+07:00',
  eventDates:['2026-08-17T19:30:00+07:00','2026-09-27T14:00:00+07:00'],
  price:'800 - 4,500',
  status:'onsale',
  url:'https://www.thaiticketmajor.com/performance/DramaQueens-TheMusical.html',
  sourcePageUrl:'https://www.thaiticketmajor.com/performance/DramaQueens-TheMusical.html',
  imageUrl:'https://www.thaiticketmajor.com/img_poster/prefix_1/0780/6780/DramaQueens-TheMusical-6a439b5e86b42-l.jpg',
  description:'ข้อมูลจากหน้า ThaiTicketMajor หมวดละครเวที',
  ticketNote:'ซื้อบัตร'
}];
const $=s=>document.querySelector(s), esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function monthKey(d){return d.slice(0,7)}
function monthLabel(k){return thMonths[Number(k.slice(5,7))-1]||k}
function today(){let d=new Date();d.setHours(0,0,0,0);return d}
function primaryDate(e){let ds=e.eventDates||[e.eventDate],now=today();return ds.find(value=>{let d=new Date(value);return isNaN(d)||d>=now})||ds[0]||e.eventDate}
function future(e){let ds=e.eventDates||[e.eventDate];return ds.some(value=>{let d=new Date(value);return isNaN(d)||d>=today()})}
function fmt(d){return new Intl.DateTimeFormat('th-TH',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}).format(new Date(d)).replace(' น.','')}
function dateText(e){let ds=e.eventDates||[e.eventDate];return ds.map(fmt).join(' / ')}
function price(e){let p=String(e.price||'ดูราคาบนเว็บต้นทาง');if(!/\d/.test(p))return p;if(/บาท|THB|฿|Early Bird|Pre[- ]?Sale|Pre[- ]?Early Bird|Live Streaming/i.test(p))return p;return `เริ่ม ${p} บาท`}
function applyOverrides(events){return events.map(e=>({...e,...(categoryOverrides[e.id]||{}),...(imageOverrides[e.id]?{imageUrl:imageOverrides[e.id]}:{})}))}
function mergeDuplicateRuns(events){let byKey=new Map(), out=[];for(let event of events){let baseTitle=event.title.replace(/\s+-\s+The\s+(First|Second|Third|Fourth)\s+Night\b/ig,'').trim();let key=[event.source,baseTitle,event.venue].join('|').toLowerCase();if(!byKey.has(key)){let copy={...event,title:baseTitle,eventDates:[event.eventDate]};byKey.set(key,copy);out.push(copy);continue}let target=byKey.get(key);target.eventDates=[...new Set([...(target.eventDates||[target.eventDate]),event.eventDate])].sort();target.description=target.description||event.description;target.ticketNote=target.ticketNote||event.ticketNote}return out}
function matchQuery(e){let q=state.q.toLowerCase().trim();return !q||[e.title,e.venue,e.source,e.categoryLabel].join(' ').toLowerCase().includes(q)}
function visible(){return all.filter(future).filter(matchQuery).filter(e=>state.cat==='all'||e.category===state.cat).filter(e=>state.source==='all'||e.source===state.source).filter(e=>state.month==='all'||monthKey(primaryDate(e))===state.month).sort((a,b)=>new Date(primaryDate(a))-new Date(primaryDate(b)))}
function chip(label,val,key,count){return `<button class="chip ${state[key]===val?'active':''}" data-${key}="${esc(val)}"><span>${esc(label)}</span>${count!=null?`<span class="chip-count">${count}</span>`:''}</button>`}
function countBy(events,keyFn){let counts={all:events.length};events.forEach(e=>{let key=keyFn(e);counts[key]=(counts[key]||0)+1});return counts}
function renderFilters(){let base=all.filter(future).filter(matchQuery), byCat=base.filter(e=>state.cat==='all'||e.category===state.cat), bySource=byCat.filter(e=>state.source==='all'||e.source===state.source), cats=countBy(base,e=>e.category), src=countBy(byCat,e=>e.source), mon=countBy(bySource,e=>monthKey(primaryDate(e)));if(state.source!=='all'&&!src[state.source])state.source='all';if(state.month!=='all'&&!mon[state.month])state.month='all';byCat=base.filter(e=>state.cat==='all'||e.category===state.cat);bySource=byCat.filter(e=>state.source==='all'||e.source===state.source);src=countBy(byCat,e=>e.source);mon=countBy(bySource,e=>monthKey(primaryDate(e)));let catNames={all:'ทั้งหมด',thai:'ไทย',korea:'เกาหลี',western:'ฝรั่ง',stage:'ละครเวที'};$('#cats').innerHTML=Object.keys(catNames).filter(k=>cats[k]).map(k=>chip(catNames[k],k,'cat',cats[k])).join('');$('#sources').innerHTML=Object.keys(src).sort((a,b)=>a==='all'?-1:b==='all'?1:a.localeCompare(b)).map(k=>chip(k==='all'?'ทุกเว็บ':k,k,'source',src[k])).join('');$('#months').innerHTML=Object.keys(mon).sort((a,b)=>a==='all'?-1:b==='all'?1:a.localeCompare(b)).map(k=>chip(k==='all'?'ทุกเดือน':monthLabel(k),k,'month',mon[k])).join('')}
function card(e){let url=e.sourcePageUrl||e.url||'#';return `<article class="card"><a class="cover" href="${esc(url)}" target="_blank" rel="noopener"><img src="${esc(e.imageUrl||'')}" alt=""></a><div class="body"><div class="meta"><span class="pill">${esc(e.categoryLabel)}</span><span class="pill source">${esc(e.source)}</span></div><h2><a class="title" href="${esc(url)}" target="_blank" rel="noopener">${esc(e.title)}</a></h2><p class="venue">${esc(e.venue)}</p><p class="date">ขายบัตร: ${esc(e.saleText||fmt(e.saleDate))}</p><p class="date">วันงาน: ${esc(dateText(e))}</p><p class="price">${esc(price(e))}</p><a class="open" href="${esc(url)}" target="_blank" rel="noopener">เปิดเว็บจริง</a></div></article>`}
function groupedCards(items){if(state.month!=='all')return items.map(card).join('');let groups=items.reduce((acc,e)=>{let key=monthKey(primaryDate(e));(acc[key] ||= []).push(e);return acc},{});return Object.keys(groups).sort().map(key=>`<section class="month-section"><h2 class="month-title">${esc(monthLabel(key))}<span>${groups[key].length} งาน</span></h2><div class="grid">${groups[key].map(card).join('')}</div></section>`).join('')}
function render(){renderFilters();let items=visible();$('#grid').innerHTML=groupedCards(items);$('#summary').innerHTML=`กำลังแสดง <b>${items.length}</b> จาก <b>${all.filter(future).length}</b> งานที่ยังไม่ผ่านวันจัดงาน`;$('#empty').classList.toggle('show',!items.length)}
document.body.addEventListener('click',e=>{let b=e.target.closest('.chip');if(!b)return;['cat','source','month'].forEach(k=>{if(b.dataset[k])state[k]=b.dataset[k]});render()});
$('#q').addEventListener('input',e=>{state.q=e.target.value;render()});
(async()=>{try{let txt=(await Promise.all(parts.map(p=>fetch(p).then(r=>r.text())))).join('');all=mergeDuplicateRuns(applyOverrides([...(JSON.parse(txt).events||[]),...extraEvents]));state.month=`${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;render()}catch(e){$('#summary').textContent='โหลดข้อมูลไม่สำเร็จ';console.error(e)}})();
</script>
</body>
</html>
