<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Concert Calendar Website</title>
  <style>
    :root{--ink:#111827;--muted:#64748b;--line:#e2e8f0;--bg:#f8fafc;--card:#fff;--brand:#0f766e;--dark:#111827;--radius:10px}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}
    header{padding:28px clamp(16px,4vw,44px);background:#111827;color:#fff}h1{margin:0;font-size:clamp(30px,5vw,56px);line-height:1}.sub{margin:12px 0 0;color:#cbd5e1;max-width:780px;line-height:1.65}
    main{padding:22px clamp(16px,4vw,44px) 50px}.toolbar{position:sticky;top:0;z-index:2;margin:-22px calc(clamp(16px,4vw,44px)*-1) 20px;padding:14px clamp(16px,4vw,44px);background:rgba(248,250,252,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
    input{width:min(720px,100%);padding:13px 14px;border:1px solid var(--line);border-radius:var(--radius);font:inherit;background:#fff}.filters{display:grid;gap:12px;margin:18px 0}.filter-row{display:flex;gap:8px;overflow:auto;padding-bottom:2px}.chip{border:1px solid var(--line);background:#fff;color:#334155;border-radius:999px;padding:9px 13px;font-weight:750;white-space:nowrap;cursor:pointer}.chip.active{background:#111827;color:#fff;border-color:#111827}.summary{margin:12px 0;color:#475569}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:0 8px 26px rgba(15,23,42,.06)}
    .cover{display:block;aspect-ratio:4/3;background:#e2e8f0;overflow:hidden}.cover img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}.cover:hover img{transform:scale(1.03)}.body{padding:14px}.meta{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px}.pill{font-size:12px;font-weight:800;border-radius:999px;background:#ecfeff;color:#0f766e;padding:5px 8px}.source{background:#f1f5f9;color:#475569}h2{font-size:17px;line-height:1.3;margin:0 0 8px}.title{color:inherit;text-decoration:none}.title:hover{text-decoration:underline}.venue,.date,.price{font-size:13px;color:#64748b;line-height:1.45;margin:6px 0}.price{font-weight:800;color:#334155}.open{display:inline-flex;margin-top:10px;background:#111827;color:#fff;text-decoration:none;border-radius:8px;padding:9px 11px;font-size:13px;font-weight:800}.empty{display:none;padding:28px;border:1px dashed var(--line);border-radius:var(--radius);background:#fff;color:#64748b}.empty.show{display:block}
  </style>
</head>
<body>
<header><h1>Concert Calendar Website</h1><p class="sub">เว็บรวมคอนเสิร์ตในไทย แยกตามเดือน ประเภท และเว็บขายบัตร พร้อมลิงก์ไปหน้ารายละเอียดจริงของแต่ละงาน</p></header>
<main>
  <div class="toolbar"><input id="q" placeholder="ค้นหาชื่อคอนเสิร์ต สถานที่ หรือเว็บขายบัตร"></div>
  <div class="filters"><div id="cats" class="filter-row"></div><div id="sources" class="filter-row"></div><div id="months" class="filter-row"></div></div>
  <p id="summary" class="summary">กำลังโหลดข้อมูล...</p><section id="grid" class="grid"></section><div id="empty" class="empty">ไม่พบงานตามฟิลเตอร์ที่เลือก</div>
</main>
<script>
const parts=[1,2,3,4].map(n=>`data/real-events-${String(n).padStart(2,'0')}.jsonpart`);
const thMonths=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const state={cat:'all',source:'all',month:'all',q:''};let all=[];
const $=s=>document.querySelector(s), esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function monthKey(d){return d.slice(0,7)}function monthLabel(k){return thMonths[Number(k.slice(5,7))-1]||k}function today(){let d=new Date();d.setHours(0,0,0,0);return d}
function future(e){let d=new Date(e.eventDate);return isNaN(d)||d>=today()}function fmt(d){return new Intl.DateTimeFormat('th-TH',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}).format(new Date(d)).replace(' น.','')}
function price(e){let p=String(e.price||'ดูราคาบนเว็บต้นทาง');if(!/\d/.test(p))return p;if(/บาท|THB|฿|Early Bird|Pre[- ]?Sale|Pre[- ]?Early Bird|Live Streaming/i.test(p))return p;return `เริ่ม ${p} บาท`}
function visible(){let q=state.q.toLowerCase().trim();return all.filter(future).filter(e=>state.cat==='all'||e.category===state.cat).filter(e=>state.source==='all'||e.source===state.source).filter(e=>state.month==='all'||monthKey(e.eventDate)===state.month).filter(e=>!q||[e.title,e.venue,e.source,e.categoryLabel].join(' ').toLowerCase().includes(q)).sort((a,b)=>new Date(a.eventDate)-new Date(b.eventDate))}
function chip(label,val,key,count){return `<button class="chip ${state[key]===val?'active':''}" data-${key}="${esc(val)}">${esc(label)}${count!=null?' '+count:''}</button>`}
function renderFilters(){let base=all.filter(future), cats={all:base.length}, src={all:base.length}, mon={all:base.length};base.forEach(e=>{cats[e.category]=(cats[e.category]||0)+1;src[e.source]=(src[e.source]||0)+1;mon[monthKey(e.eventDate)]=(mon[monthKey(e.eventDate)]||0)+1});let catNames={all:'ทั้งหมด',thai:'ไทย',korea:'เกาหลี',western:'ฝรั่ง',stage:'ละครเวที'};$('#cats').innerHTML=Object.keys(catNames).filter(k=>cats[k]).map(k=>chip(catNames[k],k,'cat',cats[k])).join('');$('#sources').innerHTML=Object.keys(src).sort((a,b)=>a==='all'?-1:b==='all'?1:a.localeCompare(b)).map(k=>chip(k==='all'?'ทุกเว็บ':k,k,'source',src[k])).join('');$('#months').innerHTML=Object.keys(mon).sort((a,b)=>a==='all'?-1:b==='all'?1:a.localeCompare(b)).map(k=>chip(k==='all'?'ทุกเดือน':monthLabel(k),k,'month',mon[k])).join('')}
function card(e){let url=e.sourcePageUrl||e.url||'#';return `<article class="card"><a class="cover" href="${esc(url)}" target="_blank" rel="noopener"><img src="${esc(e.imageUrl||'')}" alt=""></a><div class="body"><div class="meta"><span class="pill">${esc(e.categoryLabel)}</span><span class="pill source">${esc(e.source)}</span></div><h2><a class="title" href="${esc(url)}" target="_blank" rel="noopener">${esc(e.title)}</a></h2><p class="venue">${esc(e.venue)}</p><p class="date">ขายบัตร: ${esc(e.saleText||fmt(e.saleDate))}</p><p class="date">วันงาน: ${esc(fmt(e.eventDate))}</p><p class="price">${esc(price(e))}</p><a class="open" href="${esc(url)}" target="_blank" rel="noopener">เปิดเว็บจริง</a></div></article>`}
function render(){renderFilters();let items=visible();$('#grid').innerHTML=items.map(card).join('');$('#summary').innerHTML=`กำลังแสดง <b>${items.length}</b> จาก <b>${all.filter(future).length}</b> งานที่ยังไม่ผ่านวันจัดงาน`;$('#empty').classList.toggle('show',!items.length)}
document.body.addEventListener('click',e=>{let b=e.target.closest('.chip');if(!b)return;['cat','source','month'].forEach(k=>{if(b.dataset[k])state[k]=b.dataset[k]});render()});$('#q').addEventListener('input',e=>{state.q=e.target.value;render()});
(async()=>{try{let txt=(await Promise.all(parts.map(p=>fetch(p).then(r=>r.text())))).join('');all=JSON.parse(txt).events||[];state.month=`${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;render()}catch(e){$('#summary').textContent='โหลดข้อมูลไม่สำเร็จ';console.error(e)}})();
</script>
</body>
</html>
